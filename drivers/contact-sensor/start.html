<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verisure — Connexion</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:     #C8102E;
      --red-dim: #8a0b1f;
      --ink:     #0f0f0f;
      --ink-2:   #3a3a3a;
      --ink-3:   #8a8a8a;
      --surface: #f7f6f4;
      --white:   #ffffff;
      --border:  #e2e0db;
      --radius:  10px;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--surface);
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    /* ── Header bande rouge ── */
    .card-head {
      background: var(--red);
      padding: 1.5rem 1.75rem 1.25rem;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.75rem;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg { width: 18px; height: 18px; fill: white; }

    .brand-name {
      font-size: 15px;
      font-weight: 500;
      color: white;
      letter-spacing: 0.02em;
    }

    .card-title {
      font-size: 22px;
      font-weight: 300;
      color: white;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .card-subtitle {
      font-size: 12.5px;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
      font-weight: 300;
    }

    /* ── Step indicator ── */
    .steps {
      display: flex;
      gap: 6px;
      margin-top: 1rem;
    }

    .step-dot {
      height: 3px;
      border-radius: 99px;
      transition: all 0.35s ease;
    }

    .step-dot.active  { background: white; width: 24px; }
    .step-dot.done    { background: rgba(255,255,255,0.5); width: 12px; }
    .step-dot.pending { background: rgba(255,255,255,0.2); width: 12px; }

    /* ── Body ── */
    .card-body {
      padding: 1.5rem 1.75rem 1.75rem;
    }

    /* ── Panes ── */
    .pane { display: none; }
    .pane.visible { display: block; }

    /* ── Fields ── */
    .field { margin-bottom: 1rem; }

    .field-label {
      display: block;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--ink-3);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
    }

    .field-input.error {
      border-color: var(--red);
      background: #fff5f6;
    }

    /* ── Code OTP ── */
    .otp-wrap {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 0.5rem 0 0.25rem;
    }

    .otp-digit {
      width: 42px;
      height: 52px;
      text-align: center;
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--red);
    }

    .otp-digit:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
    }

    .otp-digit.filled {
      border-color: var(--ink-2);
      background: white;
    }

    /* ── Hint SMS ── */
    .sms-hint {
      font-size: 12.5px;
      color: var(--ink-3);
      text-align: center;
      margin-top: 0.75rem;
      line-height: 1.5;
    }

    .sms-hint strong { color: var(--ink-2); }

    /* ── Bouton principal ── */
    .btn-primary {
      width: 100%;
      height: 44px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover:not(:disabled) { background: var(--red-dim); }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Lien retour ── */
    .back-link {
      display: block;
      text-align: center;
      font-size: 12.5px;
      color: var(--ink-3);
      margin-top: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--red); }

    /* ── Message d'erreur ── */
    .error-msg {
      font-size: 12.5px;
      color: var(--red);
      background: #fff5f6;
      border: 1px solid #f5c0c8;
      border-radius: var(--radius);
      padding: 8px 12px;
      margin-top: 0.75rem;
      display: none;
      line-height: 1.45;
    }

    .error-msg.visible { display: block; }

    /* ── Success flash ── */
    .success-msg {
      font-size: 12.5px;
      color: #0a6640;
      background: #ecfdf3;
      border: 1px solid #a7f0c4;
      border-radius: var(--radius);
      padding: 8px 12px;
      margin-top: 0.75rem;
      display: none;
    }

    .success-msg.visible { display: block; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.1rem 0;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 0.85rem 1.75rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .footer-note {
      font-size: 11px;
      color: var(--ink-3);
      line-height: 1.5;
      text-align: center;
    }

    /* ── Animations ── */
    .pane.visible {
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="card">

    <!-- En-tête -->
    <div class="card-head">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5L12 1zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/>
          </svg>
        </div>
        <span class="brand-name">Verisure</span>
      </div>
      <div class="card-title" id="pane-title">Connexion</div>
      <div class="card-subtitle" id="pane-subtitle">Entrez vos identifiants Verisure France</div>
      <div class="steps">
        <div class="step-dot active"  id="dot-1"></div>
        <div class="step-dot pending" id="dot-2"></div>
      </div>
    </div>

    <!-- Corps -->
    <div class="card-body">

      <!-- Pane 1 : Login -->
      <div class="pane visible" id="pane-login">
        <div class="field">
          <label class="field-label" for="email">Adresse email</label>
          <input class="field-input" type="email" id="email"
                 placeholder="votre@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label class="field-label" for="password">Mot de passe</label>
          <input class="field-input" type="password" id="password"
                 placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="error-msg" id="login-error"></div>
        <button class="btn-primary" id="btn-login" onclick="submitLogin()">
          <div class="spinner" id="login-spinner"></div>
          <span id="btn-login-label">Continuer</span>
        </button>
      </div>

      <!-- Pane 2 : MFA -->
      <div class="pane" id="pane-mfa">
        <div class="otp-wrap" id="otp-wrap">
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d0">
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d1">
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d2">
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d3">
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d4">
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d5">
        </div>
        <div class="sms-hint" id="sms-hint">
          Code envoyé au téléphone enregistré<br>
          sur votre compte <strong id="hint-email"></strong>
        </div>
        <div class="error-msg"   id="mfa-error"></div>
        <div class="success-msg" id="mfa-success">Authentification réussie !</div>
        <button class="btn-primary" id="btn-mfa" onclick="submitMfa()" disabled>
          <div class="spinner" id="mfa-spinner"></div>
          <span id="btn-mfa-label">Valider</span>
        </button>
        <a class="back-link" onclick="goBack()">← Recommencer</a>
      </div>

    </div>

    <!-- Pied de page -->
    <div class="card-footer">
      <p class="footer-note">
        Vos identifiants sont stockés localement sur Homey<br>et ne transitent que vers l'API Verisure France.
      </p>
    </div>

  </div>
</div>

<script>
  // ── Homey pairing socket ──────────────────────────────────────────────
  // Homey injecte `HomeyReady` et un objet global `Homey` dans les vues pair
  if (typeof HomeyReady !== 'undefined') HomeyReady();

  // ── Utilitaires UI ────────────────────────────────────────────────────

  function setLoading(btnId, spinnerId, labelId, loading, labelText) {
    const btn     = document.getElementById(btnId);
    const spinner = document.getElementById(spinnerId);
    const label   = document.getElementById(labelId);
    btn.disabled              = loading;
    spinner.style.display     = loading ? 'block' : 'none';
    label.textContent         = loading ? '' : labelText;
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError(id) {
    document.getElementById(id).classList.remove('visible');
  }

  function showSuccess(id) {
    document.getElementById(id).classList.add('visible');
  }

  // ── Dots de progression ───────────────────────────────────────────────

  function setStep(step) {
    const dot1 = document.getElementById('dot-1');
    const dot2 = document.getElementById('dot-2');
    if (step === 1) {
      dot1.className = 'step-dot active';
      dot2.className = 'step-dot pending';
    } else {
      dot1.className = 'step-dot done';
      dot2.className = 'step-dot active';
    }
  }

  // ── Navigation entre panes ────────────────────────────────────────────

  function showPane(id, title, subtitle) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('visible'));
    document.getElementById(id).classList.add('visible');
    document.getElementById('pane-title').textContent    = title;
    document.getElementById('pane-subtitle').textContent = subtitle;
  }

  function goBack() {
    clearOtp();
    hideError('mfa-error');
    setStep(1);
    showPane('pane-login', 'Connexion', 'Entrez vos identifiants Verisure France');
  }

  // ── Pane 1 : Login ────────────────────────────────────────────────────

  async function submitLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    hideError('login-error');

    if (!email || !password) {
      showError('login-error', 'Veuillez remplir tous les champs.');
      return;
    }

    setLoading('btn-login', 'login-spinner', 'btn-login-label', true, 'Continuer');

    try {
      // Appel driver.js → session.setHandler('login_start')
      await Homey.emit('login_start', { email, password });

      // Succès → passage au pane MFA
      document.getElementById('hint-email').textContent = email;
      setStep(2);
      showPane(
        'pane-mfa',
        'Code de vérification',
        'Un SMS vient d\'être envoyé à votre téléphone'
      );

      // Focus sur le premier digit
      setTimeout(() => document.getElementById('d0').focus(), 50);

    } catch (err) {
      const msg = err && err.message
        ? err.message
        : 'Identifiants incorrects ou service indisponible.';
      showError('login-error', msg);
    } finally {
      setLoading('btn-login', 'login-spinner', 'btn-login-label', false, 'Continuer');
    }
  }

  // ── Pane 2 : MFA ──────────────────────────────────────────────────────

  // Saisie digit par digit avec navigation automatique
  const digits = [0,1,2,3,4,5].map(i => document.getElementById('d' + i));

  digits.forEach((input, idx) => {
    input.addEventListener('input', e => {
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val;

      if (val) {
        e.target.classList.add('filled');
        if (idx < 5) digits[idx + 1].focus();
      } else {
        e.target.classList.remove('filled');
      }

      checkOtpComplete();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !e.target.value && idx > 0) {
        digits[idx - 1].value = '';
        digits[idx - 1].classList.remove('filled');
        digits[idx - 1].focus();
        checkOtpComplete();
      }
      // Coller un code complet (ex: depuis SMS sur iOS)
      if (e.key === 'v' && (e.ctrlKey || e.metaKey)) return;
    });

    // Support paste sur n'importe quel digit
    input.addEventListener('paste', e => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData)
        .getData('text').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((ch, i) => {
        if (digits[i]) {
          digits[i].value = ch;
          digits[i].classList.add('filled');
        }
      });
      if (pasted.length >= 6) digits[5].focus();
      checkOtpComplete();
    });
  });

  function getOtpValue() {
    return digits.map(d => d.value).join('');
  }

  function clearOtp() {
    digits.forEach(d => {
      d.value = '';
      d.classList.remove('filled');
    });
    document.getElementById('btn-mfa').disabled = true;
  }

  function checkOtpComplete() {
    const complete = getOtpValue().length === 6;
    document.getElementById('btn-mfa').disabled = !complete;
    if (complete) document.getElementById('btn-mfa').focus();
  }

  async function submitMfa() {
    const code = getOtpValue();
    hideError('mfa-error');

    if (code.length !== 6) return;

    setLoading('btn-mfa', 'mfa-spinner', 'btn-mfa-label', true, 'Valider');

    try {
      // Appel driver.js → session.setHandler('login_mfa')
      await Homey.emit('login_mfa', { code });

      showSuccess('mfa-success');

      // Laisser Homey passer à la vue suivante (list_devices)
      setTimeout(() => Homey.nextView(), 800);

    } catch (err) {
      clearOtp();
      digits[0].focus();

      const msg = err && err.message
        ? err.message
        : 'Code incorrect ou expiré. Veuillez réessayer.';
      showError('mfa-error', msg);

    } finally {
      setLoading('btn-mfa', 'mfa-spinner', 'btn-mfa-label', false, 'Valider');
    }
  }

  // ── Soumission clavier ────────────────────────────────────────────────

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitLogin();
  });
</script>

</body>
</html>
